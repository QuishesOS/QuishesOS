# QuishesOS Theme: Aurora Glass (DARK)
# Holographic dark theme with cyan-purple gradient

# Theme colors
$color_primary = rgb(00d4ff)
$color_secondary = rgb(b759ff)
$color_accent = rgb(00d4ff)
$color_accent_alt = rgb(b759ff)

# Background colors (dark theme)
$color_bg_base = rgb(0d0d0f)
$color_bg_dark = rgb(1a1a1c)
$color_bg_darker = rgb(121214)
$color_bg_gradient = rgb(1e1e24)

# Text colors (light for dark theme)
$color_text = rgb(e8e8ee)
$color_text_soft = rgba(232, 232, 238, 0.72)
$color_text_faint = rgba(232, 232, 238, 0.45)

# Border colors
col.active_border = rgba(00d4ffee) rgba(b759ffee) 45deg
col.inactive_border = rgba(b759ff55)

# Shadow color (stronger for dark theme)
col.shadow = rgba(00d4ff88)
col.shadow_inactive = rgba(b759ff44)

# Workspace colors
$workspace_active = rgb(00d4ff)
$workspace_inactive = rgb(b759ff)

# Window decoration
$border_active = rgba(00d4ffee)
$border_inactive = rgba(b759ff55)

# Blur intensity (heavy for glass effect)
blur {
    passes = 4
    size = 8
}

# Dark theme window opacity
decoration {
    active_opacity = 0.92
    inactive_opacity = 0.78
}
