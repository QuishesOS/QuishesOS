# QuishesOS Theme: Liquid Pastel
# Soft pink/purple gradient theme with warm tones

# Theme colors
$color_primary = rgb(ff9ee8)
$color_secondary = rgb(b4a7ff)
$color_accent = rgb(ff9ee8)
$color_accent_alt = rgb(b4a7ff)

# Background colors (for potential use)
$color_bg_base = rgb(F7F3EC)
$color_bg_sky = rgb(BFE3F0)
$color_bg_blush = rgb(F6CFE0)
$color_bg_lavender = rgb(D9C9F0)

# Text colors
$color_text = rgb(232136)
$color_text_soft = rgba(35, 33, 54, 0.62)
$color_text_faint = rgba(35, 33, 54, 0.4)

# Border colors
col.active_border = rgba(ff9ee8ee) rgba(b4a7ffee) 45deg
col.inactive_border = rgba(b4a7ff55)

# Shadow color
col.shadow = rgba(ff9ee866)
col.shadow_inactive = rgba(b4a7ff33)

# Workspace colors (for eww integration)
$workspace_active = rgb(ff9ee8)
$workspace_inactive = rgb(b4a7ff)

# Window decoration
$border_active = rgba(ff9ee8ee)
$border_inactive = rgba(b4a7ff55)

# Blur intensity (passes)
blur {
    passes = 3
    size = 6
}
