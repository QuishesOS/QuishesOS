# QuishesOS Theme: Nordic Frost
# Cool ice blue theme with pale gray-blue tones

# Theme colors
$color_primary = rgb(5e81ac)
$color_secondary = rgb(88c0d0)
$color_accent = rgb(88c0d0)
$color_accent_alt = rgb(5e81ac)

# Background colors
$color_bg_base = rgb(eceff4)
$color_bg_light = rgb(e5e9f0)
$color_bg_cool = rgb(d8dee9)
$color_bg_frost = rgb(88c0d0)

# Text colors
$color_text = rgb(2e3440)
$color_text_soft = rgba(46, 52, 64, 0.62)
$color_text_faint = rgba(46, 52, 64, 0.4)

# Border colors
col.active_border = rgba(88c0d0ee) rgba(5e81acee) 45deg
col.inactive_border = rgba(5e81ac55)

# Shadow color
col.shadow = rgba(5e81ac66)
col.shadow_inactive = rgba(88c0d033)

# Workspace colors
$workspace_active = rgb(88c0d0)
$workspace_inactive = rgb(5e81ac)

# Window decoration
$border_active = rgba(88c0d0ee)
$border_inactive = rgba(5e81ac55)

# Blur intensity
blur {
    passes = 3
    size = 6
}
