# QuishesOS Theme: Forest Mist
# Sage green with warm beige, olive accents

# Theme colors
$color_primary = rgb(8fbc8f)
$color_secondary = rgb(b8c9b8)
$color_accent = rgb(8fbc8f)
$color_accent_alt = rgb(9ca89c)

# Background colors
$color_bg_base = rgb(f5f5ec)
$color_bg_warm = rgb(e8e8d8)
$color_bg_green = rgb(d8e8d8)
$color_bg_sage = rgb(b8c9b8)

# Text colors
$color_text = rgb(2d3a2d)
$color_text_soft = rgba(45, 58, 45, 0.62)
$color_text_faint = rgba(45, 58, 45, 0.4)

# Border colors
col.active_border = rgba(8fbc8fee) rgba(b8c9b8ee) 45deg
col.inactive_border = rgba(9ca89c55)

# Shadow color
col.shadow = rgba(8fbc8f66)
col.shadow_inactive = rgba(b8c9b833)

# Workspace colors
$workspace_active = rgb(8fbc8f)
$workspace_inactive = rgb(b8c9b8)

# Window decoration
$border_active = rgba(8fbc8fee)
$border_inactive = rgba(9ca89c55)

# Blur intensity
blur {
    passes = 3
    size = 6
}
