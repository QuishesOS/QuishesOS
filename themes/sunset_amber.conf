# QuishesOS Theme: Sunset Amber
# Warm orange and golden yellow tones

# Theme colors
$color_primary = rgb(ff9d5c)
$color_secondary = rgb(ffb366)
$color_accent = rgb(ff9d5c)
$color_accent_alt = rgb(d97634)

# Background colors
$color_bg_base = rgb(fff8f0)
$color_bg_cream = rgb(ffe8d4)
$color_bg_peach = rgb(ffd4b0)
$color_bg_amber = rgb(ffb366)

# Text colors
$color_text = rgb(3d2a1c)
$color_text_soft = rgba(61, 42, 28, 0.62)
$color_text_faint = rgba(61, 42, 28, 0.4)

# Border colors
col.active_border = rgba(ff9d5cee) rgba(ffb366ee) 45deg
col.inactive_border = rgba(d9763455)

# Shadow color
col.shadow = rgba(ff9d5c66)
col.shadow_inactive = rgba(d9763433)

# Workspace colors
$workspace_active = rgb(ff9d5c)
$workspace_inactive = rgb(ffb366)

# Window decoration
$border_active = rgba(ff9d5cee)
$border_inactive = rgba(d9763455)

# Blur intensity
blur {
    passes = 3
    size = 5
}
