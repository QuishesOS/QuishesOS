# QuishesOS Theme: Sakura Dream
# Cherry blossom pink with soft lavender accents

# Theme colors
$color_primary = rgb(ffb3d9)
$color_secondary = rgb(c9a0dc)
$color_accent = rgb(ffb3d9)
$color_accent_alt = rgb(c9a0dc)

# Background colors
$color_bg_base = rgb(fff5f9)
$color_bg_cream = rgb(ffe9f0)
$color_bg_pink = rgb(ffd4e5)
$color_bg_lavender = rgb(e8d4f0)

# Text colors
$color_text = rgb(3d2434)
$color_text_soft = rgba(61, 36, 52, 0.62)
$color_text_faint = rgba(61, 36, 52, 0.4)

# Border colors
col.active_border = rgba(ffb3d9ee) rgba(c9a0dcee) 45deg
col.inactive_border = rgba(c9a0dc55)

# Shadow color
col.shadow = rgba(ffb3d966)
col.shadow_inactive = rgba(c9a0dc33)

# Workspace colors
$workspace_active = rgb(ffb3d9)
$workspace_inactive = rgb(c9a0dc)

# Window decoration
$border_active = rgba(ffb3d9ee)
$border_inactive = rgba(c9a0dc55)

# Blur intensity
blur {
    passes = 4
    size = 7
}
