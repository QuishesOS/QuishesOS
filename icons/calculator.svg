<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="calcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb3d9"/>
      <stop offset="100%" stop-color="#c9a0dc"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#calcGrad)" filter="url(#shadow)"/>
  
  <!-- Calculator body -->
  <g transform="translate(116, 90)">
    <!-- Main body -->
    <rect x="0" y="0" width="280" height="320" rx="20" 
          fill="rgba(255,255,255,0.95)" 
          stroke="rgba(255,179,217,0.3)" 
          stroke-width="3"/>
    
    <!-- Display -->
    <rect x="20" y="20" width="240" height="60" rx="10" 
          fill="rgba(201,160,220,0.15)" 
          stroke="rgba(201,160,220,0.3)" 
          stroke-width="2"/>
    <text x="245" y="63" 
          font-family="Outfit, system-ui, sans-serif" 
          font-size="32" 
          fill="#232136" 
          text-anchor="end" 
          font-weight="600" 
          letter-spacing="-0.5">1234</text>
    
    <!-- Buttons grid -->
    <!-- Row 1 -->
    <circle cx="45" cy="120" r="18" fill="rgba(255,179,217,0.2)" stroke="rgba(255,179,217,0.4)" stroke-width="2"/>
    <circle cx="95" cy="120" r="18" fill="rgba(255,179,217,0.2)" stroke="rgba(255,179,217,0.4)" stroke-width="2"/>
    <circle cx="145" cy="120" r="18" fill="rgba(255,179,217,0.2)" stroke="rgba(255,179,217,0.4)" stroke-width="2"/>
    <circle cx="235" cy="120" r="18" fill="rgba(255,179,217,0.4)" stroke="rgba(255,179,217,0.6)" stroke-width="2"/>
    
    <!-- Row 2 -->
    <circle cx="45" cy="170" r="18" fill="rgba(255,255,255,0.6)" stroke="rgba(201,160,220,0.3)" stroke-width="2"/>
    <circle cx="95" cy="170" r="18" fill="rgba(255,255,255,0.6)" stroke="rgba(201,160,220,0.3)" stroke-width="2"/>
    <circle cx="145" cy="170" r="18" fill="rgba(255,255,255,0.6)" stroke="rgba(201,160,220,0.3)" stroke-width="2"/>
    <circle cx="235" cy="170" r="18" fill="rgba(255,179,217,0.4)" stroke="rgba(255,179,217,0.6)" stroke-width="2"/>
    
    <!-- Row 3 -->
    <circle cx="45" cy="220" r="18" fill="rgba(255,255,255,0.6)" stroke="rgba(201,160,220,0.3)" stroke-width="2"/>
    <circle cx="95" cy="220" r="18" fill="rgba(255,255,255,0.6)" stroke="rgba(201,160,220,0.3)" stroke-width="2"/>
    <circle cx="145" cy="220" r="18" fill="rgba(255,255,255,0.6)" stroke="rgba(201,160,220,0.3)" stroke-width="2"/>
    <circle cx="235" cy="220" r="18" fill="rgba(255,179,217,0.4)" stroke="rgba(255,179,217,0.6)" stroke-width="2"/>
    
    <!-- Row 4 -->
    <circle cx="45" cy="270" r="18" fill="rgba(255,255,255,0.6)" stroke="rgba(201,160,220,0.3)" stroke-width="2"/>
    <circle cx="120" cy="270" r="18" fill="rgba(255,255,255,0.6)" stroke="rgba(201,160,220,0.3)" stroke-width="2"/>
    <circle cx="235" cy="270" r="18" fill="rgba(201,160,220,0.6)" stroke="rgba(201,160,220,0.8)" stroke-width="2"/>
    
    <!-- Button labels with better typography -->
    <text x="45" y="126" font-family="Outfit, system-ui, sans-serif" font-size="17" fill="#232136" text-anchor="middle" font-weight="700">C</text>
    <text x="235" y="126" font-family="Outfit, system-ui, sans-serif" font-size="18" fill="#232136" text-anchor="middle" font-weight="600">÷</text>
    <text x="235" y="176" font-family="Outfit, system-ui, sans-serif" font-size="18" fill="#232136" text-anchor="middle" font-weight="600">×</text>
    <text x="235" y="226" font-family="Outfit, system-ui, sans-serif" font-size="20" fill="#232136" text-anchor="middle" font-weight="600">−</text>
    <text x="235" y="276" font-family="Outfit, system-ui, sans-serif" font-size="19" fill="#232136" text-anchor="middle" font-weight="600">+</text>
    
    <text x="45" y="176" font-family="Outfit, system-ui, sans-serif" font-size="18" fill="#232136" text-anchor="middle" font-weight="600">7</text>
    <text x="95" y="176" font-family="Outfit, system-ui, sans-serif" font-size="18" fill="#232136" text-anchor="middle" font-weight="600">8</text>
    <text x="145" y="176" font-family="Outfit, system-ui, sans-serif" font-size="18" fill="#232136" text-anchor="middle" font-weight="600">9</text>
    
    <text x="45" y="226" font-family="Outfit, system-ui, sans-serif" font-size="18" fill="#232136" text-anchor="middle" font-weight="600">4</text>
    <text x="95" y="226" font-family="Outfit, system-ui, sans-serif" font-size="18" fill="#232136" text-anchor="middle" font-weight="600">5</text>
    <text x="145" y="226" font-family="Outfit, system-ui, sans-serif" font-size="18" fill="#232136" text-anchor="middle" font-weight="600">6</text>
    
    <text x="45" y="276" font-family="Outfit, system-ui, sans-serif" font-size="18" fill="#232136" text-anchor="middle" font-weight="600">1</text>
    <text x="120" y="276" font-family="Outfit, system-ui, sans-serif" font-size="18" fill="#232136" text-anchor="middle" font-weight="600">0</text>
  </g>
</svg>
