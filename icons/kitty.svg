<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5e81ac"/>
      <stop offset="100%" stop-color="#88c0d0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#termGrad)" filter="url(#shadow)"/>
  
  <!-- Terminal window -->
  <g transform="translate(80, 100)">
    <!-- Window background -->
    <rect x="0" y="0" width="352" height="280" rx="16" 
          fill="rgba(24,22,38,0.95)" 
          stroke="rgba(255,255,255,0.1)" 
          stroke-width="2"/>
    
    <!-- Window header -->
    <rect x="0" y="0" width="352" height="40" rx="16" 
          fill="rgba(255,255,255,0.08)"/>
    <rect x="0" y="32" width="352" height="8" fill="rgba(255,255,255,0.03)"/>
    
    <!-- Traffic lights -->
    <circle cx="20" cy="20" r="6" fill="#ff6b6b"/>
    <circle cx="44" cy="20" r="6" fill="#ffd93d"/>
    <circle cx="68" cy="20" r="6" fill="#6bcf7f"/>
    
    <!-- Terminal content -->
    <!-- Prompt line -->
    <text x="20" y="80" font-family="JetBrains Mono, monospace" font-size="18" fill="#7CE0A6">$</text>
    <rect x="35" y="67" width="8" height="18" fill="#7CE0A6" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Code lines -->
    <text x="20" y="120" font-family="JetBrains Mono, monospace" font-size="14" fill="#CFE8D8" opacity="0.7">npm run dev</text>
    <text x="20" y="150" font-family="JetBrains Mono, monospace" font-size="14" fill="#88c0d0" opacity="0.6">Server running...</text>
    <text x="20" y="180" font-family="JetBrains Mono, monospace" font-size="14" fill="#7CE0A6" opacity="0.6">✓ Ready</text>
  </g>
</svg>
