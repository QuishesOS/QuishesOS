<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="monitorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#b759ff"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#monitorGrad)" filter="url(#shadow)"/>
  
  <!-- System monitor graph -->
  <g transform="translate(80, 120)">
    <!-- Monitor frame -->
    <rect x="0" y="0" width="352" height="240" rx="16" 
          fill="rgba(24,22,38,0.9)" 
          stroke="rgba(255,255,255,0.15)" 
          stroke-width="3"/>
    
    <!-- Grid lines -->
    <line x1="0" y1="60" x2="352" y2="60" stroke="rgba(0,212,255,0.15)" stroke-width="1"/>
    <line x1="0" y1="120" x2="352" y2="120" stroke="rgba(0,212,255,0.15)" stroke-width="1"/>
    <line x1="0" y1="180" x2="352" y2="180" stroke="rgba(0,212,255,0.15)" stroke-width="1"/>
    
    <!-- CPU graph line (cyan) -->
    <polyline points="20,160 50,140 80,100 110,120 140,80 170,90 200,60 230,100 260,80 290,120 320,90" 
              fill="none" 
              stroke="#00d4ff" 
              stroke-width="4" 
              stroke-linecap="round" 
              stroke-linejoin="round"
              opacity="0.9">
      <animate attributeName="points" 
               values="20,160 50,140 80,100 110,120 140,80 170,90 200,60 230,100 260,80 290,120 320,90;
                       20,140 50,100 80,120 110,80 140,90 170,60 200,100 230,80 260,120 290,90 320,110;
                       20,160 50,140 80,100 110,120 140,80 170,90 200,60 230,100 260,80 290,120 320,90" 
               dur="3s" 
               repeatCount="indefinite"/>
    </polyline>
    
    <!-- Memory graph line (purple) -->
    <polyline points="20,180 50,170 80,150 110,160 140,140 170,150 200,130 230,150 260,140 290,160 320,150" 
              fill="none" 
              stroke="#b759ff" 
              stroke-width="3" 
              stroke-linecap="round" 
              stroke-linejoin="round"
              opacity="0.7">
      <animate attributeName="points" 
               values="20,180 50,170 80,150 110,160 140,140 170,150 200,130 230,150 260,140 290,160 320,150;
                       20,170 50,150 80,160 110,140 140,150 170,130 200,150 230,140 260,160 290,150 320,170;
                       20,180 50,170 80,150 110,160 140,140 170,150 200,130 230,150 260,140 290,160 320,150" 
               dur="3s" 
               repeatCount="indefinite"/>
    </polyline>
    
    <!-- Labels -->
    <text x="16" y="28" font-family="JetBrains Mono, monospace" font-size="14" fill="#00d4ff" font-weight="600">CPU</text>
    <text x="16" y="220" font-family="JetBrains Mono, monospace" font-size="12" fill="#b759ff" opacity="0.8">MEM</text>
    
    <!-- Percentage indicators -->
    <text x="310" y="28" font-family="JetBrains Mono, monospace" font-size="14" fill="rgba(255,255,255,0.7)">67%</text>
    <text x="310" y="220" font-family="JetBrains Mono, monospace" font-size="12" fill="rgba(255,255,255,0.6)">42%</text>
  </g>
</svg>
