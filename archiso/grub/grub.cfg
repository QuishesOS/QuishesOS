# GRUB boot configuration for QuishesOS
# Load fonts and modules
insmod all_video
insmod gfxterm
insmod jpeg
insmod png

# Graphics settings
set gfxmode=auto
set gfxpayload=keep
terminal_input console
terminal_output gfxterm

# Timeout (5 seconds)
set timeout=5
set timeout_style=menu

# Default boot entry
set default=0

# Menu entries
menuentry "QuishesOS Live System" {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% quiet splash
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "QuishesOS Live System (nomodeset)" {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% nomodeset quiet splash
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "QuishesOS Live System (copytoram)" {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% copytoram quiet splash
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "Boot existing OS" {
    configfile /grub/custom.cfg
}

menuentry "UEFI Firmware Settings" {
    fwsetup
}
