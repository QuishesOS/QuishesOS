# QuishesOS Hyprland Configuration
# Base configuration file - themes are sourced separately

# Monitor configuration
monitor=,preferred,auto,1
monitor=,highres,auto,1

# Execute at launch
exec-once = eww daemon && eww open bar && eww open dock
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dunst
exec-once = hyprpaper

# Source theme configuration
source = ~/.config/hypr/theme.conf

# Input configuration
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
    }
}

# General window and workspace settings
general {
    gaps_in = 8
    gaps_out = 16
    border_size = 2
    col.active_border = $color_accent
    col.inactive_border = $color_border_inactive
    layout = dwindle
    resize_on_border = true
}

# Decoration (blur, shadows, etc.)
decoration {
    rounding = 12
    
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
    }
    
    drop_shadow = true
    shadow_range = 20
    shadow_render_power = 3
    col.shadow = rgba(1a1a1a80)
    col.shadow_inactive = rgba(1a1a1a40)
    
    dim_inactive = false
    dim_strength = 0.05
}

# Animations
animations {
    enabled = true
    bezier = smooth, 0.25, 0.9, 0.32, 1.0
    bezier = overshot, 0.34, 1.56, 0.64, 1.0
    bezier = bounce, 1, 1.6, 0.6, 0.85
    
    animation = windows, 1, 4, smooth, slide
    animation = windowsOut, 1, 3, smooth, slide
    animation = windowsMove, 1, 4, smooth
    animation = border, 1, 10, default
    animation = borderangle, 1, 100, default, loop
    animation = fade, 1, 3, smooth
    animation = workspaces, 1, 5, smooth, slidevert
}

# Dwindle layout
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

# Master layout
master {
    new_is_master = false
    special_scale_factor = 0.9
}

# Gestures
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
}

# Misc settings
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    vrr = 1
    enable_swallow = true
    swallow_regex = ^(kitty)$
}

# Window rules
windowrulev2 = opacity 0.95 0.85,class:^(kitty)$
windowrulev2 = opacity 0.95 0.85,class:^(thunar)$
windowrulev2 = opacity 0.98 0.90,class:^(firefox)$
windowrulev2 = float,class:^(QuishesOS-Settings)$
windowrulev2 = center,class:^(QuishesOS-Settings)$
windowrulev2 = size 980 700,class:^(QuishesOS-Settings)$
windowrulev2 = float,class:^(rofi)$
windowrulev2 = animation slide,class:^(rofi)$

# Keybindings
$mod = SUPER

# Application launchers
bind = $mod, RETURN, exec, kitty
bind = $mod, E, exec, thunar
bind = $mod, B, exec, firefox
bind = $mod, SPACE, exec, rofi -show drun
bind = $mod, T, exec, ~/.config/hypr/scripts/theme-switcher.sh

# Display management
bind = $mod SHIFT, V, exec, ~/.config/hypr/scripts/vrr-toggle.sh
bind = $mod SHIFT, R, exec, ~/.config/hypr/scripts/refresh-rate-menu.sh
bind = $mod SHIFT, D, exec, ~/.config/hypr/scripts/display-info.sh

# Window management
bind = $mod, Q, killactive
bind = $mod, M, exit
bind = $mod, V, togglefloating
bind = $mod, P, pseudo
bind = $mod, J, togglesplit
bind = $mod, F, fullscreen

# Focus movement
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Workspace switching
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad)
bind = $mod, S, togglespecialworkspace
bind = $mod SHIFT, S, movetoworkspace, special

# Mouse bindings
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Screenshots
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim - | wl-copy

# Media keys
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
