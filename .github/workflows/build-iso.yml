name: Build QuishesOS ISO

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Arch Linux environment
      run: |
        # Install Arch Linux in a container
        docker pull archlinux:latest
        
    - name: Build ISO
      run: |
        docker run --rm --privileged \
          -v ${{ github.workspace }}:/workspace \
          -v ${{ github.workspace }}/out:/out \
          archlinux:latest \
          /bin/bash -c "
            # Update system
            pacman -Syu --noconfirm
            
            # Install archiso
            pacman -S --noconfirm archiso
            
            # Build ISO
            cd /workspace
            mkdir -p /out
            mkarchiso -v -w /tmp/archiso-work -o /out archiso
          "
    
    - name: Get ISO info
      id: iso_info
      run: |
        ISO_FILE=$(ls -1 out/*.iso 2>/dev/null | head -1)
        if [ -n "$ISO_FILE" ]; then
          ISO_NAME=$(basename "$ISO_FILE")
          ISO_SIZE=$(du -h "$ISO_FILE" | cut -f1)
          echo "name=$ISO_NAME" >> $GITHUB_OUTPUT
          echo "size=$ISO_SIZE" >> $GITHUB_OUTPUT
          echo "found=true" >> $GITHUB_OUTPUT
        else
          echo "found=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Upload ISO artifact
      if: steps.iso_info.outputs.found == 'true'
      uses: actions/upload-artifact@v3
      with:
        name: quishesos-iso
        path: out/*.iso
        retention-days: 30
    
    - name: Upload checksum
      if: steps.iso_info.outputs.found == 'true'
      uses: actions/upload-artifact@v3
      with:
        name: quishesos-checksums
        path: out/*.sha256
        retention-days: 30
    
    - name: Build summary
      if: steps.iso_info.outputs.found == 'true'
      run: |
        echo "## QuishesOS ISO Build Complete! 🎉" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**ISO File:** ${{ steps.iso_info.outputs.name }}" >> $GITHUB_STEP_SUMMARY
        echo "**Size:** ${{ steps.iso_info.outputs.size }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Download the ISO from the Artifacts section above." >> $GITHUB_STEP_SUMMARY
